name: Build postmarketOS Rootfs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openssl tar xz-utils
          pip3 install --user pmbootstrap

      - name: Build postmarketOS Rootfs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap init \
            --work="/home/runner/work/pmbootstrap" \
            --arch="aarch64" \
            --device="qemu-aarch64" \
            --ui="none" \
            --no-confirm
          pmbootstrap config systemd always
          pmbootstrap install --no-kernel --no-fstab
          mkdir -p output/postmarketos
          sudo cp -a /home/runner/work/pmbootstrap/chroot_native/mnt/rootfs_qemu-aarch64/. output/postmarketos/

      - name: Create Tarball
        run: |
          cd output
          tar -cJf postmarketos-aarch64.tar.xz postmarketos
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-rootfs
          path: output/postmarketos-aarch64.tar.xz
      - name: Pmos Proot Image
        uses: softprops/action-gh-release@v1
        with:
          body: image of pmos for proot
          tag_name: github_run
          name: pmos proot build
          files: output/postmarketos-aarch64.tar.xz
